<!doctype html>
<html lang="es">
<head>

<body>

<nav class="mini-nav">

<main class="code-page">
  <h1>CSS</h1>
  <pre><code id="code"></code></pre>
</main>

<script>
  fetch("./style.css")
    .then(r => r.text())
    .then(t => document.getElementById("code").textContent = t)
    .catch(() => document.getElementById("code").textContent = "No se pudo cargar style.css");
</script>

</body>
</html>
